<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | SMM Premium</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo">SMM<span>PRO</span></div>
            <nav>
                <a href="#" class="active">Visão Geral</a>
                <a href="#servicos">Gerenciar Serviços</a>
                <a href="/dashboard.html">Voltar ao Painel</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Painel de Controle do Administrador</h1>
                <div class="user-badge">Admin</div>
            </header>

            <section class="metrics-grid">
                <div class="card-metric">
                    <h3>Faturamento Total</h3>
                    <p class="metric-value">R$ 0,00</p>
                </div>
                <div class="card-metric">
                    <h3>Usuários Ativos</h3>
                    <p class="metric-value" id="total-usuarios">0</p>
                </div>
                <div class="card-metric">
                    <h3>Pedidos Pendentes</h3>
                    <p class="metric-value" id="pedidos-pendentes">0</p>
                </div>
            </section>

            <section class="admin-section" id="servicos">
                <h2>Adicionar Novo Serviço (Integração API)</h2>
                <form id="form-add-servico" class="admin-form">
                    <input type="text" id="nome-servico" placeholder="Nome do Serviço (ex: Seguidores Insta)" required>
                    <input type="text" id="categoria-servico" placeholder="Categoria (ex: Instagram)" required>
                    <input type="number" step="0.01" id="preco-servico" placeholder="Preço por 1000 (R$)" required>
                    <input type="text" id="api-provedor" placeholder="URL da API do Provedor" required>
                    <input type="number" id="id-provedor" placeholder="ID do Serviço no Provedor" required>
                    <button type="submit" class="btn-premium">Adicionar Serviço</button>
                </form>
            </section>
        </main>
    </div>
    <script src="admin.js"></script>
</body>
</html>
