<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel SMM - Entrar</title>
    <!-- Leitura direta e nativa do arquivo CSS na raiz -->
    <link rel="stylesheet" href="/login.css">
</head>
<body>

    <div class="login-container">
        <div class="logo-login">📈 Painel SMM</div>
        <div class="subtitle-login" id="formSubtitle">Entre na sua conta para gerenciar seus pedidos</div>

        <!-- FORMULÁRIO DE LOGIN -->
        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="login_email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login_senha" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Acessar Painel</button>
            <div class="toggle-form">
                Não tem uma conta? <a href="#" id="btnIrParaCadastro">Cadastre-se</a>
            </div>
        </form>

        <!-- FORMULÁRIO DE CADASTRO -->
        <form id="cadastroForm" style="display: none;">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="cad_nome" placeholder="Seu Nome">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="cad_email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="cad_senha" required placeholder="Crie uma senha">
            </div>
            <button type="submit" class="btn-login" style="background-color: #34c759;">Criar Minha Conta</button>
            <div class="toggle-form">
                Já tem uma conta? <a href="#" id="btnIrParaLogin">Fazer Login</a>
            </div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const cadastroForm = document.getElementById('cadastroForm');
        const formSubtitle = document.getElementById('formSubtitle');

        // Alternar visualmente para a tela de Cadastro
        document.getElementById('btnIrParaCadastro').addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            cadastroForm.style.display = 'block';
            formSubtitle.innerText = 'Crie sua carteira e comece a turbinar suas redes';
        });

        // Alternar visualmente para a tela de Login
        document.getElementById('btnIrParaLogin').addEventListener('click', (e) => {
            e.preventDefault();
            cadastroForm.style.display = 'none';
            loginForm.style.display = 'block';
            formSubtitle.innerText = 'Entre na sua conta para gerenciar seus pedidos';
        });

        // PROCESSAMENTO DE CADASTRO (Envio via JSON para o FastAPI)
        cadastroForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('cad_email').value;
            const senha = document.getElementById('cad_senha').value;

            try {
                // Rota limpa /cadastro (Ajuste caso o prefixo do seu router mude no main.py)
                const response = await fetch("/cadastro", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: email,
                        password: senha
                    })
                });

                const resultado = await response.json();

                if (!response.ok) {
                    throw new Error(resultado.detail || "Falha ao registrar conta no servidor.");
                }

                alert('✅ Conta criada com sucesso! Faça login para acessar.');
                cadastroForm.style.display = 'none';
                loginForm.style.display = 'block';
                formSubtitle.innerText = 'Entre na sua conta para gerenciar seus pedidos';
                cadastroForm.reset();

            } catch (error) {
                console.error("Erro de Autenticação:", error);
                alert(`❌ Erro de Sistema: ${error.message}`);
            }
        });

        // PROCESSAMENTO DE LOGIN (Envio via JSON ou x-www-form-urlencoded)
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login_email').value;
            const senha = document.getElementById('login_senha').value;

            try {
                // Rota limpa /login (Sem pontos relativos)
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: email,
                        password: senha
                    })
                });

                const resultado = await response.json();

                if (!response.ok) {
                    throw new Error(resultado.detail || "Credenciais incorretas ou inválidas.");
                }

                // O redirecionamento só acontece se o FastAPI responder com status 200 (Sucesso)
                window.location.href = resultado.redirecionar || "/dashboard"; 

            } catch (error) {
                console.error("Erro de Autenticação:", error);
                alert(`❌ Acesso Negado: ${error.message}`);
            }
        });
    </script>
</body>
</html>
