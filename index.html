<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel SMM - Entrar</title>
    <!-- Ajuste do link CSS para Jinja2 carregar na raiz -->
    <link rel="stylesheet" href="{{ url_for('static', path='login.css') }}">
</head>
<body>

    <div class="login-container">
        <div class="logo-login">📈 Painel SMM</div>
        <div class="subtitle-login" id="formSubtitle">Entre na sua conta para gerenciar seus pedidos</div>

        <!-- FORMULÁRIO DE LOGIN REAL -->
        <form id="loginForm">
            <div class="form-group">
                <label>Usuário (E-mail)</label>
                <!-- Atributo name="username" adicionado para casar com o FastAPI -->
                <input type="email" name="username" id="login_email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <!-- Atributo name="password" adicionado para casar com o FastAPI -->
                <input type="password" name="password" id="login_senha" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Acessar Painel</button>
            <div class="toggle-form">
                Não tem uma conta? <a href="#" id="btnIrParaCadastro">Cadastre-se</a>
            </div>
        </form>

        <!-- FORMULÁRIO DE CADASTRO REAL -->
        <form id="cadastroForm" style="display: none;">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="cad_nome" placeholder="Seu Nome">
            </div>
            <div class="form-group">
                <label>Usuário (E-mail)</label>
                <input type="email" name="username" id="cad_email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" id="cad_senha" required placeholder="Crie uma senha">
            </div>
            <button type="submit" class="btn-login" style="background-color: #34c759;">Criar Minha Conta</button>
            <div class="toggle-form">
                Já tem uma conta? <a href="#" id="btnIrParaLogin">Fazer Login</a>
            </div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const cadastroForm = document.getElementById('cadastroForm');
        const formSubtitle = document.getElementById('formSubtitle');

        // Alternar visualmente para a tela de Cadastro
        document.getElementById('btnIrParaCadastro').addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            cadastroForm.style.display = 'block';
            formSubtitle.innerText = 'Crie sua carteira e comece a turbinar suas redes';
        });

        // Alternar visualmente para a tela de Login
        document.getElementById('btnIrParaLogin').addEventListener('click', (e) => {
            e.preventDefault();
            cadastroForm.style.display = 'none';
            loginForm.style.display = 'block';
            formSubtitle.innerText = 'Entre na sua conta para gerenciar seus pedidos';
        });

        // ENVIO REAL DO CADASTRO VIA FETCH ASSÍNCRONO
        cadastroForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(cadastroForm);

            try {
                const response = await fetch("/auth/cadastro", {
                    method: "POST",
                    body: formData
                });
                const resultado = await response.json();

                if (response.ok) {
                    alert('✅ Conta criada com sucesso! Faça login para acessar.');
                    cadastroForm.style.display = 'none';
                    loginForm.style.display = 'block';
                    formSubtitle.innerText = 'Entre na sua conta para gerenciar seus pedidos';
                } else {
                    alert("Erro no cadastro: " + (resultado.detail || "Falha ao registrar."));
                }
            } catch (error) {
                console.error("Erro:", error);
                alert("Erro ao conectar com o servidor.");
            }
        });

        // ENVIO REAL DO LOGIN VIA FETCH ASSÍNCRONO
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(loginForm);

            try {
                const response = await fetch("/auth/login", {
                    method: "POST",
                    body: formData
                });
                const resultado = await response.json();

                if (response.ok) {
                    // O backend configurou o Cookie HTTP-Only. Redireciona via rota controlada.
                    window.location.href = resultado.redirecionar; 
                } else {
                    alert("Erro no login: " + (resultado.detail || "Credenciais inválidas."));
                }
            } catch (error) {
                console.error("Erro:", error);
                alert("Erro ao conectar com o servidor.");
            }
        });
    </script>
</body>
</html>
