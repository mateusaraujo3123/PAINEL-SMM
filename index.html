<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Painel SMM</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold text-center mb-6 text-indigo-600">Painel SMM</h1>
        <form id="smmForm">
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">ID do Serviço:</label>
                <input type="number" id="servico_id" class="w-full border p-2 rounded" required placeholder="Ex: 101">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">Link do Perfil/Post:</label>
                <input type="url" id="link_rede_social" class="w-full border p-2 rounded" required placeholder="https://instagram.com...">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-1">Quantidade:</label>
                <input type="number" id="quantidade" class="w-full border p-2 rounded" required placeholder="Ex: 1000">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded font-bold hover:bg-indigo-700">Enviar Pedido</button>
        </form>
    </div>

    <!-- 🔴 ISSO É NOVO: JavaScript que conecta com o FastAPI -->
    <script>
        document.getElementById('smmForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede a página de recarregar

            // Coleta os dados digitados na tela
            const dados = {
                servico_id: parseInt(document.getElementById('servico_id').value),
                link_rede_social: document.getElementById('link_rede_social').value,
                quantidade: parseInt(document.getElementById('quantidade').value)
            };

            try {
                // Envia os dados para o FastAPI
                const resposta = await fetch('http://127.0.0', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const resultado = await resposta.json();
                
                if (resposta.ok) {
                    alert('✅ Sucesso! ' + resultado.mensagem);
                } else {
                    alert('❌ Erro na validação dos dados.');
                }
            } catch (erro) {
                alert('❌ Erro: O backend FastAPI está desligado!');
            }
        });
    </script>
</body>
</html>
